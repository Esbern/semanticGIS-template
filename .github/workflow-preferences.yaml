# Repository-level workflow preferences for agents.
# Keep this file small and explicit. Values here are defaults, not hard policy,
# unless they repeat a Required rule from instruction files.

python:
  require_local_environment: true
  default_manager: venv
  manager_priority:
    - venv
    - micromamba
    - conda
  gis_manager_priority:
    - micromamba
    - conda
    - venv
  environment_name: my-project
  venv_path: .venv
  decision_log_file: Design_Rationale.md

osm:
  preferred_fetch_library: osmnx
  fallback_fetch_method: overpass_raw
  allow_manual_endpoint_override: true

scripts:
  default_folder: 10_scripts
  document_logic_in_design_rationale: true
  allow_one_off_scripts_outside_default_folder: true
  default_execution_mode: phase_gated
  require_user_confirmation_between_stages: true
  allow_full_pipeline_only_on_explicit_request: true

logging:
  default_mode: verbose
  allow_quiet_mode: true
  allow_file_logging: true
  default_log_dir: .cache/logs
  recommend_structured_logging: true

data_flow:
  default_lifecycle: acquire_document_sanitize_document_approve_analyze_document_approve_visualize
  require_checkpoint_after_each_stage: true
  allow_lifecycle_deviation_with_rationale: true
  checkpoint_required_fields:
    - stage_name
    - status
    - outputs
    - sanity_metrics
    - next_expected_input
    - notes_for_user_validation
  checkpoint_output_formats:
    - plain_text
    - table
    - json
    - yaml
    - structured_logs

knowledge_hubs:
  default_danish_contract_hub: semanticgis.dk
  default_global_contract_hub: semanticgis.org
  allow_multi_hub_in_single_project: true
  route_by_source_type:
    danish_registers: semanticgis.dk
    datafordeler_services: semanticgis.dk
    osm: semanticgis.org
    satellite_imagery: semanticgis.org
    global_reference_layers: semanticgis.org
